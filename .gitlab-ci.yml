# Source: https://docs.astral.sh/uv/guides/integration/gitlab/#using-uv-pip
image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

stages:
  - lint
  - test
  - build
  - publish

# the .uv-cache is a global cache hashed by package contents...
# we want to persist this cache between CI runs so that uv can rebuild the venv quickly.
variables:
  UV_CACHE_DIR: .uv-cache

cache:
  # unique cache for each branch; same branch can reuse dependencies.
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .uv-cache/

lint_job:
  stage: lint

  # basic tools for linting and type checking
  script:
    - uv run ruff check # default linting rules
    - uvx ty check      # default type checking rules

test:
  stage: test
  script:
    - uv run pytest --junitxml=report.xml

  artifacts:
      when: always
      paths:
        - report.xml
      reports:
        junit: report.xml

build_job:
  stage: build

  # only build releases off of main; feature branches/MRs stop after test.
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  script:
    - uv build

  artifacts:
    paths:
      - dist/

publish_job:
  stage: publish

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  # requires a UV_PUBLISH_TOKEN CI/CD variable (masked + protected) holding
  # a PyPI API token; see https://docs.astral.sh/uv/guides/package/#publishing-your-package
  script:
    - VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
    - echo "pyproject.toml version is $VERSION"

    # only publish if this version isn't already on PyPI, so that pipelines
    # without a version bump build (for validation) but don't attempt to republish.
    - |
      if uv run --no-project check_pypi_published.py diffolars "$VERSION"; then
        echo "diffolars $VERSION is already published on PyPI, skipping publish."
      else
        uv publish
      fi
